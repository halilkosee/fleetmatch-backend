name: Deploy DEV Backend

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: dev-backend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to DEV VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEV_SSH_PORT || 22 }}
          script_stop: true
          script: |
            export APP_DIR="${{ secrets.DEV_APP_DIR || '/opt/easyfleetmatch/backend' }}"
            export BRANCH="develop"
            bash "$APP_DIR/scripts/deploy-dev.sh"
