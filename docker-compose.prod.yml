services:
  postgres:
    image: postgres:16-alpine
    container_name: fleetmatch-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-fleetmatch_prod}
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-fleetmatch_prod}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - fleetmatch_prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-fleetmatch_prod} -d ${DB_NAME:-fleetmatch_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fleetmatch-prod-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - fleetmatch_prod_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleetmatch-prod-backend
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  fleetmatch_prod_postgres_data:
  fleetmatch_prod_redis_data:
