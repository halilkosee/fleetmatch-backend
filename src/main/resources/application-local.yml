spring:
  config:
    activate:
      on-profile: local
    import: optional:file:.env.local[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fleetmatch}
    username: ${DB_USERNAME:halil}
    password: ${DB_PASSWORD:}

  jpa:
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}

fleetmatch:
  environment: LOCAL
  jwt:
    secret: ${JWT_SECRET:local-development-jwt-secret-change-me-64-characters-minimum-1234567890}
  api:
    base-url: ${API_BASE_URL:http://localhost:8080}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
