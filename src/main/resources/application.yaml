server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: fleetmatch-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: ${SPRING_FLYWAY_LOCATIONS:classpath:db/migration}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

fleetmatch:
  environment: ${FLEETMATCH_ENVIRONMENT:LOCAL}
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}
  api:
    base-url: ${API_BASE_URL:http://localhost:8080}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  mail:
    provider: ${MAIL_PROVIDER:log}
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:no-reply@easyfleetmatch.com}
  sms:
    provider: ${SMS_PROVIDER:log}
    webhook-url: ${SMS_WEBHOOK_URL:}
    token: ${SMS_WEBHOOK_TOKEN:}
    from: ${SMS_FROM:EasyFleetMatch}
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from: ${TWILIO_FROM:}
  push:
    provider: ${PUSH_PROVIDER:log}
    fcm:
      project-id: ${FCM_PROJECT_ID:}
      client-email: ${FCM_CLIENT_EMAIL:}
      private-key: ${FCM_PRIVATE_KEY:}
  documents:
    storage:
      provider: ${DOCUMENT_STORAGE_PROVIDER:local}
      local-path: ${DOCUMENT_STORAGE_LOCAL_PATH:./data/company-documents}
    max-file-size-bytes: ${DOCUMENT_MAX_FILE_SIZE_BYTES:10485760}
  rate-limit:
    store: ${RATE_LIMIT_STORE:memory}
  workflow:
    load-offer-expiration-ms: ${LOAD_OFFER_EXPIRATION_MS:172800000}
    fleet-confirmation-timeout-ms: ${FLEET_CONFIRMATION_TIMEOUT_MS:14400000}
    recovery:
      initial-delay-ms: ${WORKFLOW_RECOVERY_INITIAL_DELAY_MS:60000}
      fixed-delay-ms: ${WORKFLOW_RECOVERY_FIXED_DELAY_MS:300000}
