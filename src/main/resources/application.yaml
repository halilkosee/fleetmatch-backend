server:
  port: 8080

spring:
  application:
    name: fleetmatch-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/fleetmatch
    username: halil
    password:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

fleetmatch:
  jwt:
    secret: 8e5a1f7c4b2d9e6f8a3c1b5d7e9f2a4c8b6d1e3f5a7c9b2d4e6f8a1c3b5d7e9
    expiration: 86400000
