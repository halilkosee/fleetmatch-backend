spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:fleetmatch_prod}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

fleetmatch:
  environment: PROD
  mail:
    provider: ${MAIL_PROVIDER:smtp}
  sms:
    provider: ${SMS_PROVIDER:webhook}
  rate-limit:
    store: ${RATE_LIMIT_STORE:redis}
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://easyfleetmatch.com,https://app.easyfleetmatch.com}
  api:
    base-url: ${API_BASE_URL:https://api.easyfleetmatch.com}
  frontend:
    base-url: ${FRONTEND_BASE_URL:https://app.easyfleetmatch.com}
