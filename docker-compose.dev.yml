services:
  postgres:
    image: postgres:16-alpine
    container_name: fleetmatch-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-fleetmatch_dev}
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-fleetmatch_dev}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-change-me-dev-db-password}
    ports:
      - "5433:5432"
    volumes:
      - fleetmatch_dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-fleetmatch_dev} -d ${DB_NAME:-fleetmatch_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fleetmatch-dev-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - fleetmatch_dev_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleetmatch-dev-backend
    restart: unless-stopped
    env_file:
      - .env.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  fleetmatch_dev_postgres_data:
  fleetmatch_dev_redis_data:
